version: '3'
services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: im_system
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
  user-service:
    build:
      context: ./backend/user-service
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8081"
  chat-service:
    build:
      context: ./backend/chat-service
    depends_on:
      - redis
    ports:
      - "8082:8082"
